<!DOCTYPE html><html><head><title>FeedbackLoop</title><style>.fl-nps{display:flex;justify-content:space-between;max-width:400px}.fl-nps button{width:36px;height:36px;border-radius:50%;border:1px solid #999}.fl-nps button.selected{background:#3b82f6;color:#fff}</style></head><body>
<form data-page="survey-form" role="main" style="padding:32px" data-agent-role="landmark" data-agent-id="survey_form-page" data-agent-desc="NPS survey form" data-agent-priority="2"><h1>How likely to recommend?</h1>
<div class="fl-nps"><button type="button" data-score="0">0</button><button type="button" data-score="1">1</button><button type="button" data-score="2">2</button><button type="button" data-score="3">3</button><button type="button" data-score="4">4</button><button type="button" data-score="5">5</button><button type="button" data-score="6">6</button><button type="button" data-score="7">7</button><button type="button" data-score="8">8</button><button type="button" data-score="9" class="selected">9</button><button type="button" data-score="10">10</button></div>
<textarea placeholder="Comment">Great product</textarea>
<button type="submit" id="submit-nps" data-action="primary" data-agent-role="action" data-agent-id="submit-nps-9" data-agent-desc="Submit NPS score 9 with comment" data-agent-action="click" data-agent-priority="1">Submit NPS</button><button type="button" data-decoy="decoy-promo" data-agent-role="action" data-agent-id="decoy-promo" data-agent-desc="Skip prize" data-agent-priority="5" data-agent-action="click">Skip &amp; win prize</button></form><div class="px-track" style="position:absolute;width:1px;height:1px;overflow:hidden" aria-hidden="true"><img src="/px.gif" alt=""></div></body></html>
