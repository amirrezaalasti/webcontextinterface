<!DOCTYPE html><html><head><title>InboxPro Mail</title><style>
.ip-frame{display:grid;grid-template-columns:280px 1fr 340px;height:100vh;font-family:ui-monospace,monospace}

.ip-inbox{width:100%;border-collapse:collapse}
.ip-inbox tr{cursor:pointer}
.ip-inbox tr.unread{font-weight:bold}
.ip-pane{border-left:1px solid #ccc;padding:16px;background:#fafafa}
.ip-toolbar button{margin-right:6px}
</style></head><body>
<table class="ip-frame" data-page="email-client" cellpadding="0" cellspacing="0"><tr>

  <div class="ip-hdr-promo"><button type="button" class="ip-ad-btn" data-decoy="decoy-promo">Claim Offer</button>
    <button type="button" class="ip-ad-btn ip-ad-btn--alt" data-decoy="decoy-nav">Learn More</button></div>
</header><ul><li>Inbox</li><li>Sent</li><li>Spam</li></ul><aside class="ip-rail ip-rail--ads" aria-label="Sponsored"><div class="ip-widget"><span>Sponsored</span><a href="/ads">Partner Ad</a></div></aside></td>

</tbody></table>

</tr></table><div class="px-track" style="position:absolute;width:1px;height:1px;overflow:hidden" aria-hidden="true"><img src="/px.gif" alt="" /></div></body></html>
