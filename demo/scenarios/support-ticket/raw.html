<!DOCTYPE html><html><head><title>HelpDesk One</title><style>.hd-ticket{max-width:560px;margin:40px auto}.hd-prio label{display:block;margin:8px 0}.hd-submit{background:#dc2626;color:#fff;border:0;padding:12px 24px}</style></head><body>
<form class="hd-ticket" data-page="support-ticket" role="main"><h1>New ticket</h1><input type="text" placeholder="Subject" value="Login outage" />
<div class="hd-prio"><label><input type="radio" name="prio" value="low" /> Low</label><label><input type="radio" name="prio" value="high" checked /> Priority</label></div>
<textarea rows="5">Users cannot log in since 09:00 UTC</textarea>
<button type="submit" class="hd-submit" id="submit-priority-ticket" data-action="primary">Submit priority ticket</button>
<button type="button" data-decoy="decoy-nav">Save draft</button></form><div class="px-track" style="position:absolute;width:1px;height:1px;overflow:hidden" aria-hidden="true"><img src="/px.gif" alt="" /></div></body></html>
