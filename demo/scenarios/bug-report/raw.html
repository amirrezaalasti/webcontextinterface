<!DOCTYPE html><html><head><title>IssueTrack</title><style>.it-modal{position:fixed;inset:10% 20%;background:#fff;border:1px solid #333;box-shadow:0 8px 32px;padding:24px;z-index:10}.it-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4)}.it-file{background:#ef4444;color:#fff;border:0;padding:12px}</style></head><body>
