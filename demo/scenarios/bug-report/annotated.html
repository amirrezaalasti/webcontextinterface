<!DOCTYPE html><html><head><title>IssueTrack</title><style>.it-modal{position:fixed;inset:10% 20%;background:#fff;border:1px solid #333;box-shadow:0 8px 32px;padding:24px;z-index:10}.it-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4)}.it-file{background:#ef4444;color:#fff;border:0;padding:12px}</style></head><body>
<div class="it-overlay"></div><dialog class="it-modal" open="" data-page="bug-report" role="main" data-agent-role="landmark" data-agent-id="bug_report-page" data-agent-desc="Bug report modal" data-agent-priority="2"><h1>Report bug</h1>
<select><option>UI</option><option>Checkout</option></select><textarea>Checkout times out after 30s on mobile</textarea>
<button type="button" class="it-file" id="file-checkout-bug" data-action="primary" data-agent-role="action" data-agent-id="file-checkout-timeout-bug" data-agent-desc="File bug reproducing checkout timeout" data-agent-action="click" data-agent-priority="1">File bug report</button>
<button type="button" data-decoy="decoy-promo" data-agent-role="action" data-agent-id="decoy-promo" data-agent-desc="Chat support" data-agent-priority="5" data-agent-action="click">Chat support instead</button></dialog><div class="px-track" style="position:absolute;width:1px;height:1px;overflow:hidden" aria-hidden="true"><img src="/px.gif" alt=""></div></body></html>
