<!DOCTYPE html><html><head><title>ShopGrid</title><style>.sg-filters{display:flex;gap:16px;padding:12px;background:#fafafa}.sg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.sg-item{border:1px solid #e5e5e5;padding:8px}</style></head><body>
<div data-page="ecommerce-search"><div class="sg-filters" role="search"><label>Stars <select id="rating-filter"><option>Any</option><option value="4">4+ stars</option></select></label>
<label>Max price <input type="number" id="max-price" value="50" /></label>
<button type="button" id="apply-filters" data-action="primary">Apply filters</button><button type="button" data-decoy="decoy-promo">Flash sale</button></div>
<table class="sg-grid" role="main"><tr><td class="sg-item">Widget $12</td><td class="sg-item">Gadget $45 ★★★★</td></tr></table><div class="px-track" style="position:absolute;width:1px;height:1px;overflow:hidden" aria-hidden="true"><img src="/px.gif" alt="" /></div></div></body></html>
