<!DOCTYPE html><html><head><title>ShopGrid</title><style>.sg-filters{display:flex;gap:16px;padding:12px;background:#fafafa}.sg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.sg-item{border:1px solid #e5e5e5;padding:8px}</style></head><body>
<div data-page="ecommerce-search" data-agent-role="landmark" data-agent-id="ecommerce_search-page" data-agent-desc="Product search with top filters" data-agent-priority="2"><div class="sg-filters" role="search"><label>Stars <select id="rating-filter"><option>Any</option><option value="4">4+ stars</option></select></label>
<label>Max price <input type="number" id="max-price" value="50"></label>
<button type="button" id="apply-filters" data-action="primary" data-agent-role="action" data-agent-id="apply-rating-price-filter" data-agent-desc="Filter results to 4-star and above under $50" data-agent-action="click" data-agent-priority="1">Apply filters</button><button type="button" data-decoy="decoy-promo" data-agent-role="action" data-agent-id="decoy-promo" data-agent-desc="Flash sale" data-agent-priority="5" data-agent-action="click">Flash sale</button></div>
<table class="sg-grid" role="main"><tbody><tr><td class="sg-item">Widget $12</td><td class="sg-item">Gadget $45 ★★★★</td></tr></tbody></table><div class="px-track" style="position:absolute;width:1px;height:1px;overflow:hidden" aria-hidden="true"><img src="/px.gif" alt=""></div></div></body></html>
