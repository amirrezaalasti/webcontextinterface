# Build docs + demo on every push. Deploy to GitHub Pages only when requested manually
# (requires Settings → Pages → Source: GitHub Actions).
#
# Production site: https://webcontextinterface.vercel.app/

name: Website build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_github_pages:
        description: Deploy to GitHub Pages (enable Pages → GitHub Actions in repo settings first)
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: website-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website (docs + demo)
        run: node scripts/build-website.mjs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: docs/.vitepress/dist
          retention-days: 7

  deploy-github-pages:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_github_pages == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: docs/.vitepress/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
