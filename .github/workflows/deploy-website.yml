# Build and deploy docs + demo to GitHub Pages on every push to main.
#
# ONE-TIME SETUP (required or deploy returns 404):
#   Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
#
# URLs:
#   GitHub Pages: https://amirrezaalasti.github.io/webcontextinterface/
#   Vercel:       https://webcontextinterface.vercel.app/

name: Deploy website (GitHub Pages)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website for GitHub Pages (repo subpath)
        run: node scripts/build-website.mjs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
